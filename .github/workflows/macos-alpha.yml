name: macOS Alpha package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signed-notarized-dmg:
    name: Signed and notarized Apple Silicon DMG
    runs-on: macos-14
    environment: alpha-release
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust with Apple Silicon target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: pnpm install --frozen-lockfile
      - name: Verify package contract and secret presence
        run: node scripts/check-macos-alpha-release.mjs --require-signing-env
      - name: Verify frozen Alpha security contract
        run: pnpm security:check
      - name: Import Developer ID certificate into an ephemeral keychain
        shell: bash
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/kruon-alpha-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/kruon-alpha-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "CERTIFICATE_PATH=$CERTIFICATE_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A -out "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
      - name: Build, sign, notarize, and staple app plus DMG
        run: pnpm desktop:bundle:macos
      - name: Verify signatures, Gatekeeper assessment, and stapling
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/kruon.app"
          DMG_PATH="$(find apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -d "$APP_PATH"
          test -n "$DMG_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
      - name: Upload private Alpha installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kruon-macos-aarch64-alpha
          path: apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
      - name: Remove ephemeral signing material
        if: always()
        shell: bash
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then security delete-keychain "$KEYCHAIN_PATH" || true; fi
          if [ -n "${CERTIFICATE_PATH:-}" ]; then rm -f "$CERTIFICATE_PATH"; fi
